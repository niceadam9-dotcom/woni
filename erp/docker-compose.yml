services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      # 프로덕션(docker-compose.prod.yml)과 동일 — 서버 렌더링 시각 KST 고정
      - TZ=Asia/Seoul
    restart: unless-stopped
