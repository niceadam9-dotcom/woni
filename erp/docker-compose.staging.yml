# 스테이징 구성 — staging.sjfire.co.kr (프로덕션 Caddy를 공유, 별도 체크아웃에서 실행)
# 위치: /home/ubuntu/woni-staging/erp (staging 브랜치 체크아웃)
# 실행: sudo docker compose -f docker-compose.staging.yml up -d --build
# 주의: 프로덕션 배포 빌드와 동시에 돌리지 말 것 (4GB 램 — 메모리 스파이크)
name: erp-staging

# ⚠️ 서비스명은 반드시 'app'이 아닌 'staging' 유지 — 프로덕션 compose도 서비스명 'app'이라,
#    같은 외부 네트워크(erp_default)에 'app' 별칭이 중복되면 Caddy의 sjfire.co.kr(app:3000)이
#    스테이징 컨테이너로도 라운드로빈되어 운영에 스테이징 데이터가 새는 사고 발생(2026-07-13).
services:
  staging:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: erp-staging-app
    expose:
      - "3000"          # 외부 직접 노출 없음 — 프로덕션 Caddy 경유만
    env_file:
      - .env.staging    # 스테이징 Supabase(nwflnzugwylhpdyodyog) 키 — 서버에만 존재, 커밋 금지
      # 주의: Next 빌드는 .env.production을 읽으므로 이 체크아웃에는
      #       .env.staging을 .env.production으로도 복사해둬야 함 (cp .env.staging .env.production)
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
    restart: always
    networks:
      - prod_net

  # xlsx→PDF 변환 (P32-1) — LibreOffice 기반. 앱이 http://gotenberg-staging:3000 으로 호출.
  # ⚠️ 고유 이름 유지 — 운영에도 gotenberg 추가 시 별칭 충돌 방지(2026-07-13 인시던트 교훈).
  gotenberg-staging:
    image: gotenberg/gotenberg:8
    container_name: gotenberg-staging
    command:
      - gotenberg
      - --api-timeout=120s
    restart: always
    networks:
      - prod_net

networks:
  # 프로덕션 compose(erp_default)의 네트워크에 합류 — Caddy가 erp-staging-app:3000으로 프록시
  prod_net:
    external: true
    name: erp_default
