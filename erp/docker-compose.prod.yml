# 프로덕션 구성 — sjfire.co.kr (Caddy가 HTTPS 자동 발급·갱신)
# 실행: docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    expose:
      - "3000"          # 외부 직접 노출 없음 — Caddy 경유만
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: always

volumes:
  caddy_data:
  caddy_config:
